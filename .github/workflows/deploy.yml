name: QuickKart CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Server Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/quickkart-server ./server

      - name: Build Client Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/quickkart-client ./client

      - name: Push Server
        run: docker push ${{ secrets.DOCKER_USERNAME }}/quickkart-server

      - name: Push Client
        run: docker push ${{ secrets.DOCKER_USERNAME }}/quickkart-client